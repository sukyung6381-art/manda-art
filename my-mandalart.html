<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 만다라트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f5f0eb; min-height: 100vh; padding: 24px 12px 48px; }
header { text-align: center; margin-bottom: 24px; }
h1 { font-size: clamp(22px, 5vw, 34px); font-weight: 700; color: #3d2e1e; margin-top: 12px; margin-bottom: 0; }

.status { position: fixed; top: 12px; right: 14px; font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 20px; background: #fff; box-shadow: 0 1px 5px rgba(0,0,0,0.15); z-index: 100; display: none; white-space: nowrap; }
.status.saved { display: block; color: #5a7a4a; }

.outer-grid { display: grid; grid-template-columns: 1fr clamp(10px,2.5vw,24px) 1fr clamp(10px,2.5vw,24px) 1fr; grid-template-rows: auto clamp(10px,2.5vw,24px) auto clamp(10px,2.5vw,24px) auto; width: 100%; max-width: 720px; margin: 0 auto; }
.arrow { display: flex; align-items: center; justify-content: center; color: #c8b89a; font-size: clamp(8px,1.2vw,11px); line-height: 1; }
.block { display: grid; grid-template-columns: repeat(3,1fr); border: 2px solid #c8b89a; }
.block-b4 { border-color: #9ca3af; }
.cell { aspect-ratio: 1; border-right: 0.5px solid #c8b89a; border-bottom: 0.5px solid #c8b89a; background: #ffffff; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 2px; }
.block .cell:nth-child(3n)        { border-right: none; }
.block .cell:nth-last-child(-n+3) { border-bottom: none; }
.cell.center { background: #e8ddd0; }
.block-b4 .cell { background: #e8ddd0; border-color: #9ca3af; }
.block-b4 .cell.main-center { background: #ffffff; }

.cell-input { width: 100%; text-align: center; outline: none; background: transparent; font-family: 'Noto Sans KR', sans-serif; font-size: clamp(8px,1.2vw,11px); line-height: 1.3; word-break: break-all; overflow: hidden; cursor: text; color: rgba(92,74,50,0.6); }
.cell.center .cell-input { color: #5c4a32; font-weight: 500; }
.block-b4 .cell .cell-input { color: #111111; }
.block-b4 .cell.main-center .cell-input { font-weight: 700; }

.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.88); background: rgba(61,46,30,0.93); color: #fff; padding: 20px 32px; border-radius: 18px; font-size: 15px; line-height: 1.75; text-align: center; z-index: 300; opacity: 0; transition: opacity 0.35s, transform 0.35s; pointer-events: none; box-shadow: 0 6px 28px rgba(0,0,0,0.28); white-space: nowrap; }
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

.demo-cursor { display: inline-block; width: 1.5px; height: 1em; background: currentColor; margin-left: 1px; vertical-align: text-bottom; animation: blink 0.8s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

#save-image-btn { padding: 11px 30px; border: none; border-radius: 24px; background: #3d2e1e; color: #fff; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.03em; cursor: pointer; box-shadow: 0 2px 8px rgba(61,46,30,0.25); transition: transform 0.12s, box-shadow 0.12s; }
#save-image-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(61,46,30,0.3); }
#save-image-btn:active { transform: translateY(0); box-shadow: 0 1px 4px rgba(61,46,30,0.25); }
</style>
</head>
<body>

<header>
  <h1>나의 만다라트</h1>
</header>

<div class="status" id="status"></div>
<div class="outer-grid" id="outer-grid"></div>
<div style="text-align:center;margin-top:24px;">
  <button id="save-image-btn" type="button">내 만다라트 저장하기</button>
</div>

<script>
const STORAGE_KEY = 'mandalart_local_cells';

const BLOCK_CELLS = {
  B0: { cells: [0,1,2,9,10,11,18,19,20],    center: 10 },
  B1: { cells: [3,4,5,12,13,14,21,22,23],   center: 13 },
  B2: { cells: [6,7,8,15,16,17,24,25,26],   center: 16 },
  B3: { cells: [27,28,29,36,37,38,45,46,47], center: 37 },
  B4: { cells: [30,31,32,39,40,41,48,49,50], center: 40 },
  B5: { cells: [33,34,35,42,43,44,51,52,53], center: 43 },
  B6: { cells: [54,55,56,63,64,65,72,73,74], center: 64 },
  B7: { cells: [57,58,59,66,67,68,75,76,77], center: 67 },
  B8: { cells: [60,61,62,69,70,71,78,79,80], center: 70 },
};

const B4_CELL_IDX = [30,31,32,39,40,41,48,49,50];
const B4_SYNC = { 0:'B0', 1:'B1', 2:'B2', 3:'B3', 5:'B5', 6:'B6', 7:'B7', 8:'B8' };
const BLOCK_CENTER_IDX = { B0:10, B1:13, B2:16, B3:37, B5:43, B6:64, B7:67, B8:70 };

const OUTER_ITEMS = [
  {type:'block',key:'B0'},{type:'gap'},{type:'block',key:'B1'},{type:'gap'},{type:'block',key:'B2'},
  {type:'gap'},{type:'arrow',text:'↖'},{type:'arrow',text:'↑'},{type:'arrow',text:'↗'},{type:'gap'},
  {type:'block',key:'B3'},{type:'arrow',text:'←'},{type:'block',key:'B4'},{type:'arrow',text:'→'},{type:'block',key:'B5'},
  {type:'gap'},{type:'arrow',text:'↙'},{type:'arrow',text:'↓'},{type:'arrow',text:'↘'},{type:'gap'},
  {type:'block',key:'B6'},{type:'gap'},{type:'block',key:'B7'},{type:'gap'},{type:'block',key:'B8'},
];

let cells = Array(81).fill('');
try {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if (Array.isArray(saved) && saved.length === 81) cells = saved;
} catch {}

const statusEl = document.getElementById('status');
let statusTimer = null;

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cells));
  const now = new Date();
  statusEl.className = 'status saved';
  statusEl.textContent = `✓ 저장됨 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { statusEl.className = 'status'; }, 2000);
}

function syncCell(changedIdx, value) {
  const b4Local = B4_CELL_IDX.indexOf(changedIdx);
  if (b4Local !== -1) {
    const targetBlock = B4_SYNC[b4Local];
    if (targetBlock) {
      const targetIdx = BLOCK_CENTER_IDX[targetBlock];
      cells[targetIdx] = value;
      const el = document.querySelector(`.cell-input[data-idx="${targetIdx}"]`);
      if (el) el.textContent = value;
    }
  }
  const centerEntry = Object.entries(BLOCK_CENTER_IDX).find(([, idx]) => idx === changedIdx);
  if (centerEntry) {
    const b4LocalStr = Object.entries(B4_SYNC).find(([, b]) => b === centerEntry[0])?.[0];
    if (b4LocalStr !== undefined) {
      const b4CellIdx = B4_CELL_IDX[Number(b4LocalStr)];
      cells[b4CellIdx] = value;
      const el = document.querySelector(`.cell-input[data-idx="${b4CellIdx}"]`);
      if (el) el.textContent = value;
    }
  }
}

function onCellInput(cellIdx, inputEl) {
  if (inputEl.textContent.length > 20) {
    inputEl.textContent = inputEl.textContent.slice(0, 20);
    const range = document.createRange();
    range.selectNodeContents(inputEl);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
  cells[cellIdx] = inputEl.textContent;
  syncCell(cellIdx, cells[cellIdx]);
  save();
}

function buildGrid() {
  const og = document.getElementById('outer-grid');
  og.innerHTML = '';

  for (const item of OUTER_ITEMS) {
    if (item.type === 'gap') { og.appendChild(document.createElement('div')); continue; }
    if (item.type === 'arrow') {
      const d = document.createElement('div');
      d.className = 'arrow';
      d.textContent = item.text;
      og.appendChild(d);
      continue;
    }
    const bd = BLOCK_CELLS[item.key];
    const be = document.createElement('div');
    be.className = `block block-${item.key.toLowerCase()}`;
    for (const ci of bd.cells) {
      const isCenter = (ci === bd.center);
      const isMainCenter = (ci === 40);
      const ce = document.createElement('div');
      ce.className = 'cell' + (isCenter ? ' center' : '') + (isMainCenter ? ' main-center' : '');

      const input = document.createElement('div');
      input.contentEditable = 'true';
      input.className = 'cell-input';
      input.dataset.idx = ci;
      input.textContent = cells[ci] || '';
      input.setAttribute('autocorrect', 'off');
      input.setAttribute('spellcheck', 'false');
      input.addEventListener('input', () => onCellInput(ci, input));

      ce.appendChild(input);
      be.appendChild(ce);
    }
    og.appendChild(be);
  }
}

let demoAbort = null;

function showIntro() {
  if (localStorage.getItem('mandalart_local_intro')) return;
  localStorage.setItem('mandalart_local_intro', '1');

  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = '영역 터치 시, 입력할 수 있어요.<br>입력하면 이 컴퓨터에 자동 저장돼요!';
  document.body.appendChild(toast);

  requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));

  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => { toast.remove(); startTypingDemo(); }, 380);
  }, 3000);
}

async function startTypingDemo() {
  // 중앙 셀이 비어있으면 우선, 아니면 빈 칸 중 랜덤 선택
  let targetIdx;
  if (!cells[40] || !cells[40].trim()) {
    targetIdx = 40;
  } else {
    const empty = cells.reduce((acc, v, i) => { if (!v || !v.trim()) acc.push(i); return acc; }, []);
    if (empty.length === 0) return; // 모든 칸이 입력됨
    targetIdx = empty[Math.floor(Math.random() * empty.length)];
  }

  const input = document.querySelector(`.cell-input[data-idx="${targetIdx}"]`);
  if (!input) return;

  let cancelled = false;
  demoAbort = () => { cancelled = true; };

  const onFocus = () => { cancelled = true; };
  input.addEventListener('focus', onFocus);

  const cursor = document.createElement('span');
  cursor.className = 'demo-cursor';
  input.parentNode.appendChild(cursor);

  const d = ms => new Promise(r => setTimeout(r, ms));
  const words = ['행복', '노후', '건강'];

  for (const word of words) {
    if (cancelled) break;
    for (const ch of word) {
      if (cancelled) break;
      await d(160);
      if (cancelled) break;
      input.textContent += ch;
    }
    if (cancelled) break;
    await d(850);
    while (input.textContent.length > 0 && !cancelled) {
      await d(90);
      if (cancelled) break;
      input.textContent = input.textContent.slice(0, -1);
    }
    if (cancelled) break;
    await d(350);
  }

  cursor.remove();
  if (!cancelled) input.textContent = '';
  input.removeEventListener('focus', onFocus);
  demoAbort = null;
}

function wrapChars(ctx, text, maxWidth) {
  const lines = [];
  let line = '';
  for (const ch of text) {
    if (line && ctx.measureText(line + ch).width > maxWidth) { lines.push(line); line = ch; }
    else line += ch;
  }
  if (line) lines.push(line);
  return lines;
}

function saveAsImage() {
  const CELL = 90, GAP = 30, MARGIN = 40, TITLE_H = 90;
  const BLOCK = CELL * 3;
  const gridW = BLOCK * 3 + GAP * 2;
  const canvas = document.createElement('canvas');
  canvas.width = gridW + MARGIN * 2;
  canvas.height = TITLE_H + gridW + MARGIN;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#f5f0eb';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#3d2e1e';
  ctx.font = "700 30px 'Noto Sans KR', sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('나의 만다라트', canvas.width / 2, TITLE_H / 2 + 8);

  const blockPos = k => MARGIN + k * (BLOCK + GAP);
  const gridY = TITLE_H;

  Object.keys(BLOCK_CELLS).forEach((key, bi) => {
    const bd = BLOCK_CELLS[key];
    const isB4 = key === 'B4';
    const bx = blockPos(bi % 3);
    const by = gridY + blockPos(Math.floor(bi / 3)) - MARGIN;

    bd.cells.forEach((ci, local) => {
      const cx = bx + (local % 3) * CELL;
      const cy = by + Math.floor(local / 3) * CELL;
      const isCenter = ci === bd.center;
      const isMainCenter = ci === 40;

      ctx.fillStyle = isB4 ? (isMainCenter ? '#ffffff' : '#e8ddd0') : (isCenter ? '#e8ddd0' : '#ffffff');
      ctx.fillRect(cx, cy, CELL, CELL);
      ctx.strokeStyle = isB4 ? '#9ca3af' : '#c8b89a';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx + 0.5, cy + 0.5, CELL, CELL);

      const text = cells[ci] || '';
      if (text) {
        const bold = isMainCenter || (isCenter && !isB4);
        ctx.font = `${bold ? 700 : 500} 13px 'Noto Sans KR', sans-serif`;
        ctx.fillStyle = isB4 ? '#111111' : (isCenter ? '#5c4a32' : 'rgba(92,74,50,0.75)');
        const lines = wrapChars(ctx, text, CELL - 10).slice(0, 4);
        const lineH = 16;
        const startY = cy + CELL / 2 - (lines.length - 1) * lineH / 2;
        lines.forEach((ln, li) => ctx.fillText(ln, cx + CELL / 2, startY + li * lineH));
      }
    });

    ctx.strokeStyle = isB4 ? '#9ca3af' : '#c8b89a';
    ctx.lineWidth = 3;
    ctx.strokeRect(bx, by, BLOCK, BLOCK);
  });

  ctx.fillStyle = '#c8b89a';
  ctx.font = "14px 'Noto Sans KR', sans-serif";
  const cCX = blockPos(1) + BLOCK / 2;
  const cCY = gridY + blockPos(1) - MARGIN + BLOCK / 2;
  const off = BLOCK / 2 + GAP / 2;
  [['↖',-off,-off],['↑',0,-off],['↗',off,-off],['←',-off,0],['→',off,0],['↙',-off,off],['↓',0,off],['↘',off,off]]
    .forEach(([g, dx, dy]) => ctx.fillText(g, cCX + dx, cCY + dy));

  const a = document.createElement('a');
  a.download = '나의 만다라트.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

document.getElementById('save-image-btn').addEventListener('click', saveAsImage);

buildGrid();
showIntro();

</script>
</body>
</html>
