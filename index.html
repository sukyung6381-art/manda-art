<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>심리상담 모임 — 만다라트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f5f0eb; min-height: 100vh; padding: 24px 12px 48px; }
header { text-align: center; margin-bottom: 20px; }
h1 { font-size: clamp(16px, 4vw, 24px); font-weight: 700; color: #3d2e1e; margin-bottom: 14px; }

.tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 20px; }
.tab-btn { padding: 7px 22px; border: 1.5px solid #c8b89a; border-radius: 20px; background: #fff; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500; color: #9a856a; transition: all 0.15s; }
.tab-btn.active { background: #3d2e1e; border-color: #3d2e1e; color: #fff; font-weight: 700; }

.outer-grid { display: grid; grid-template-columns: 1fr clamp(10px,2.5vw,24px) 1fr clamp(10px,2.5vw,24px) 1fr; grid-template-rows: auto clamp(10px,2.5vw,24px) auto clamp(10px,2.5vw,24px) auto; width: 100%; max-width: 720px; margin: 0 auto; }
.arrow { display: flex; align-items: center; justify-content: center; color: #c8b89a; font-size: clamp(8px,1.2vw,11px); line-height: 1; }
.block { display: grid; grid-template-columns: repeat(3,1fr); border: 2px solid #c8b89a; }
.block-b4 { border-color: #9ca3af; }
.cell { aspect-ratio: 1; border-right: 0.5px solid #c8b89a; border-bottom: 0.5px solid #c8b89a; background: #ffffff; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; padding: 3px; font-size: clamp(8px,1.2vw,11px); line-height: 1.3; word-break: break-all; color: rgba(92,74,50,0.6); }
.block .cell:nth-child(3n)        { border-right: none; }
.block .cell:nth-last-child(-n+3) { border-bottom: none; }
.cell.center { background: #e8ddd0; color: #5c4a32; font-weight: 500; }
.block-b4 .cell { background: #e8ddd0; border-color: #9ca3af; color: #111111; }
.block-b4 .cell.main-center { background: #ffffff; font-weight: 700; }
.save-btn { display: inline-block; margin-top: 10px; padding: 6px 18px; border: 1.5px solid #c8b89a; border-radius: 20px; background: #fff; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; color: #9a856a; }
.save-btn:hover { background: #f5f0eb; }
.save-btn:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>

<header>
  <h1>심리상담 모임 — 만다라트</h1>
  <div class="tabs">
    <button class="tab-btn active" data-member="건배">건배</button>
    <button class="tab-btn" data-member="뚜껑">뚜껑</button>
    <button class="tab-btn" data-member="구원">구원</button>
    <button class="tab-btn" data-member="장수">장수</button>
  </div>
</header>

<div class="outer-grid" id="outer-grid"></div>
<div style="text-align:center;margin-top:16px;"><button class="save-btn" onclick="saveImage()">⬇ JPG 저장</button></div>

<script>
const SUPABASE_URL = 'https://eejpkqgmlocysnhslkgk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_1oszmfRSz0g5FLw9ohA6ug_Jr1_iQm4';
const MEMBERS = ['건배','뚜껑','구원','장수'];

const BLOCK_CELLS = {
  B0: { cells: [0,1,2,9,10,11,18,19,20],    center: 10 },
  B1: { cells: [3,4,5,12,13,14,21,22,23],   center: 13 },
  B2: { cells: [6,7,8,15,16,17,24,25,26],   center: 16 },
  B3: { cells: [27,28,29,36,37,38,45,46,47], center: 37 },
  B4: { cells: [30,31,32,39,40,41,48,49,50], center: 40 },
  B5: { cells: [33,34,35,42,43,44,51,52,53], center: 43 },
  B6: { cells: [54,55,56,63,64,65,72,73,74], center: 64 },
  B7: { cells: [57,58,59,66,67,68,75,76,77], center: 67 },
  B8: { cells: [60,61,62,69,70,71,78,79,80], center: 70 },
};

const OUTER_ITEMS = [
  {type:'block',key:'B0'},{type:'gap'},{type:'block',key:'B1'},{type:'gap'},{type:'block',key:'B2'},
  {type:'gap'},{type:'arrow',text:'↖'},{type:'arrow',text:'↑'},{type:'arrow',text:'↗'},{type:'gap'},
  {type:'block',key:'B3'},{type:'arrow',text:'←'},{type:'block',key:'B4'},{type:'arrow',text:'→'},{type:'block',key:'B5'},
  {type:'gap'},{type:'arrow',text:'↙'},{type:'arrow',text:'↓'},{type:'arrow',text:'↘'},{type:'gap'},
  {type:'block',key:'B6'},{type:'gap'},{type:'block',key:'B7'},{type:'gap'},{type:'block',key:'B8'},
];

const data = {};

async function fetchAll() {
  await Promise.all(MEMBERS.map(m =>
    fetch(`${SUPABASE_URL}/rest/v1/mandalart?member=eq.${encodeURIComponent(m)}&select=cells`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } })
    .then(r => r.ok ? r.json() : [])
    .then(rows => {
      const c = rows[0]?.cells;
      data[m] = (Array.isArray(c) && c.length === 81) ? c : Array(81).fill('');
    })
    .catch(() => { data[m] = Array(81).fill(''); })
  ));
}

function buildGrid(member) {
  const og = document.getElementById('outer-grid');
  og.innerHTML = '';
  const memberCells = data[member] || Array(81).fill('');

  for (const item of OUTER_ITEMS) {
    if (item.type === 'gap') { og.appendChild(document.createElement('div')); continue; }
    if (item.type === 'arrow') { const d=document.createElement('div'); d.className='arrow'; d.textContent=item.text; og.appendChild(d); continue; }
    const bd = BLOCK_CELLS[item.key];
    const be = document.createElement('div');
    be.className = `block block-${item.key.toLowerCase()}`;
    for (const ci of bd.cells) {
      const ce = document.createElement('div');
      ce.className = 'cell' + (ci===bd.center?' center':'') + (ci===40?' main-center':'');
      ce.textContent = memberCells[ci] || '';
      be.appendChild(ce);
    }
    og.appendChild(be);
  }
}

function switchTab(member) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.member === member));
  buildGrid(member);
}

document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.member)));

(async () => {
  await fetchAll();
  switchTab('건배');
})();

async function saveImage() {
  const btn = document.querySelector('.save-btn');
  btn.textContent = '저장 중...'; btn.disabled = true;
  const member = document.querySelector('.tab-btn.active')?.dataset.member || '만다라트';
  try {
    const canvas = await html2canvas(document.getElementById('outer-grid'), { backgroundColor: '#f5f0eb', scale: 2, useCORS: true, logging: false });
    const a = document.createElement('a');
    a.download = `${member}_만다라트.jpg`;
    a.href = canvas.toDataURL('image/jpeg', 0.95);
    a.click();
  } finally {
    btn.textContent = '⬇ JPG 저장'; btn.disabled = false;
  }
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
